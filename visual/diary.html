<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>MindHeaven – Щоденник</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background:#0b0b16;
            color:#f9fafb;
            font-family:system-ui,sans-serif;
            padding:30px;
            max-width:800px;
            margin:auto;
        }
        h1 { text-align:center; color:#6366f1; margin-bottom:30px; }
        .entry {
            background:rgba(30,41,59,0.7);
            padding:16px;
            border-radius:12px;
            margin:16px 0;
            border-left:4px solid #6366f1;
        }
        .entry small { color:#9ca3af; display:block; margin-bottom:8px; }
        .entry .type { font-weight:bold; color:#a855f7; }
        .insight-section { margin-bottom:36px; }
        .insight-section h2 { font-size:1.05rem; color:#a5b4fc; margin-bottom:14px; letter-spacing:0.06em; }
        .insight-card {
            background:rgba(30,41,59,0.85);
            padding:14px 16px;
            border-radius:12px;
            margin:10px 0;
            border-left:4px solid #94a3b8;
        }
        .insight-card.worry { border-left-color:#f97316; }
        .insight-card.joy { border-left-color:#22c55e; }
        .insight-card.neutral { border-left-color:#eab308; }
        .insight-card small { color:#9ca3af; display:block; margin-bottom:6px; }
        .insight-pill {
            display:inline-block;
            font-size:0.72rem;
            padding:2px 8px;
            border-radius:999px;
            margin-top:6px;
            background:rgba(99,102,241,0.25);
            color:#c7d2fe;
        }
        .month-label { color:#64748b; font-size:0.85rem; margin:20px 0 8px; font-weight:600; }
        .back { text-align:center; margin:40px 0; }
        .back a { color:#6366f1; font-size:1.1rem; text-decoration:none; }
        .back a:hover { text-decoration:underline; }
    </style>
</head>
<body>
    <h1>Мій щоденник MindHeaven</h1>

    <section class="insight-section" id="insightSection" style="display:none;">
        <h2>Що для тебе важливо (пам'ять помічника)</h2>
        <p style="color:#94a3b8;font-size:0.88rem;margin-bottom:14px;">
            Тут збираються речі, які помічник вважає важливими згадати пізніше — те, що хвилювало, тішило або було особливим.
        </p>
        <div id="insights"></div>
    </section>

    <h2 style="font-size:1.05rem;color:#a5b4fc;margin:28px 0 14px;letter-spacing:0.06em;">Хронологія повідомлень</h2>
    <div id="entries"></div>

    <div class="back">
        <a href="/">← Повернутися до чату</a>
    </div>

    <script>
        const API_ORIGIN = window.location.origin;

        const entriesDiv = document.getElementById("entries");
        const insightsDiv = document.getElementById("insights");
        const insightSection = document.getElementById("insightSection");

        function polarityLabel(p) {
            if (p === "worry") return "хвилювання / важко";
            if (p === "joy") return "радість / підтримка";
            return "нейтрально / важливе";
        }

        function formatWhen(iso) {
            const d = new Date(iso);
            if (Number.isNaN(d.getTime())) return iso;
            return d.toLocaleString("uk-UA", { dateStyle: "long", timeStyle: "short" });
        }

        async function loadInsights() {
            try {
                const res = await fetch(`${API_ORIGIN}/api/insights?limit=80`);
                if (!res.ok) return;
                const data = await res.json();
                const items = (data.items || []).slice().reverse();
                if (items.length === 0) return;

                insightSection.style.display = "block";
                let lastMonth = "";
                insightsDiv.innerHTML = items.map((it) => {
                    const when = it.created_at || it.timestamp;
                    const d = new Date(when);
                    let header = "";
                    if (!Number.isNaN(d.getTime())) {
                        const m = d.toLocaleString("uk-UA", { month: "long", year: "numeric" });
                        if (m !== lastMonth) {
                            lastMonth = m;
                            header = `<div class="month-label">${m.charAt(0).toUpperCase() + m.slice(1)}</div>`;
                        }
                    }
                    const pol = (it.polarity || "neutral").toLowerCase();
                    const cls = ["insight-card", pol].join(" ");
                    const quote = it.quote ? `<div style="margin-top:8px;font-size:0.88rem;color:#cbd5e1;font-style:italic;">«${it.quote}»</div>` : "";
                    return `${header}
                    <div class="${cls}">
                        <small>${formatWhen(when)} · важливість ${it.importance || "—"} / 5</small>
                        <div>${it.summary}</div>
                        ${quote}
                        <span class="insight-pill">${polarityLabel(pol)}</span>
                    </div>`;
                }).join("");
            } catch (_) { /* ігноруємо — необов'язкова частина */ }
        }

        async function loadDiary() {
            try {
                const res = await fetch(`${API_ORIGIN}/api/history?limit=50`);
                if (!res.ok) throw new Error();
                const data = await res.json();
                const items = data.items || [];

                if (items.length === 0) {
                    entriesDiv.innerHTML = "<p style='text-align:center;color:#9ca3af;'>Поки що немає записів у щоденнику.</p>";
                    return;
                }

                entriesDiv.innerHTML = items.slice().reverse().map(item => {
                    const when = item.created_at || item.timestamp;
                    return `
                    <div class="entry">
                        <small>${formatWhen(when)}</small>
                        <div><span class="type">ЗАПИС:</span> ${item.text}</div>
                        <small>Настрій/емоція: ${item.mood || 'нейтральний'}</small>
                    </div>`;
                }).join("");
            } catch (err) {
                entriesDiv.innerHTML = `<p style='color:#f97373;text-align:center;'>Не вдалося завантажити щоденник. Відкрий сайт через <strong>${API_ORIGIN}</strong> (кнопка з main.py), а не як файл із папки. Переконайся, що сервер увімкнений.</p>`;
            }
        }

        loadInsights();
        loadDiary();
    </script>
</body>
</html>
